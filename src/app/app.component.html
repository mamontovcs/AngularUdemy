<h1>Hello!</h1>

<div class="container">
  <h1>Angular components</h1>

  <h2>SubHeader</h2>

  <app-post-form (onAdd)="updatePosts($event)"></app-post-form>
  <hr>
  <app-post
    *ngFor="let p of posts"
    [post]="p"
    (onRemove)="removePost($event)"
  >
    <div #info>
      <small *ngIf="p.text.length > 10; else short">Пост длинный</small>
      <ng-template #short>
        <small>Пост короткий</small>
      </ng-template>
    </div>
  </app-post>

  <h1>Angular Directives</h1>

  <p appStyle>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Autem officia pariatur, quis quo reiciendis tempora.</p>

</div>
