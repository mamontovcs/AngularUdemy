<div class="container">
  <h1>Angular Services</h1>

  <input type="text" [(ngModel)]="search">

  <button class="btn" (click)="searchField = 'title'">Title</button>
  <button class="btn" (click)="searchField = 'text'">Text</button>

  <hr>

  <button class="btn" (click)="addPost()">Add post</button>
  <div class="card" *ngFor="let post of posts | filter: search:searchField">

    <h2>{{post.title}}</h2>
    <p>{{post.text}}</p>
  </div>

  <hr>

  <p>Wait for it .... {{p | async}}</p>
  <p>Date: {{date$ |  async}}</p>
  <p>Date: {{date |  date:'long'}}</p>

  <div class="card">
    <h2>App counter: {{counter.counter}}</h2>

    <button class="btn" (click)="counter.increase()">Increase</button>
    <button class="btn" (click)="counter.decrease()">Decrease</button>
  </div>

</div>
